name: "Deploy Static Website -- digitalcampus"
  
on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - 'digitalcampus/**'
      - "!.github/**"

jobs: 
  deploy:
    uses: chnm/.github/.github/workflows/static--deploy.yml@main
    secrets: inherit
    with:
      website-devl-fqdn: "digitalcampus.tv"
      website-prod-fqdn: "digitalcampus.tv"
