name: "Deploy Static Website -- objectsofhistory"

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - 'objectsofhistory/**'
      - "!.github/**"

jobs:
  deploy:
    uses: chnm/.github/.github/workflows/static--deploy.yml@main
    secrets: inherit
    with:
      context_root: "objectsofhistory"
      website-devl-fqdn: "static.rrchnm.org"
      website-prod-fqdn: "objectofhistory.org"
