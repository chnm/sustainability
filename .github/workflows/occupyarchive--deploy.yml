name: "Deploy Static Website -- occupyarchive"

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - 'occupyarchive/**'
      - "!.github/**"

jobs:
  deploy:
    uses: chnm/.github/.github/workflows/static--deploy.yml@main
    secrets: inherit
    with:
      context_root: "occupyarchive"
      website-devl-fqdn: "static.rrchnm.org"
      website-prod-fqdn: "occupyarchive.org"
