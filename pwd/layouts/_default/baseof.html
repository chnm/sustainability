<!DOCTYPE html>
<html lang="en-US">
<head>
    {{ partial "head.html" . }}
</head>
<body class="{{ block "bodyclass" . }}{{ end }}">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header class="site-header">
        <div class="wrapper">
            <a href="/" class="site-title logo"><img src="/img/pwd-logo.png" alt="Papers of the War Department, 1784-1800 — Home"></a>
            <nav class="site-nav" aria-label="Site navigation">
                <button class="nav-toggle" aria-expanded="false" aria-label="Menu">
                    <span class="menu-icon"></span>
                </button>
                <div class="trigger" id="site-nav-menu">
                    {{ partial "nav.html" . }}
                </div>
            </nav>
        </div>
    </header>
    <main id="main-content" class="page-content">
        <div class="wrapper">
            {{ block "main" . }}{{ end }}
        </div>
    </main>
    <footer class="site-footer h-card">
        {{ partial "footer.html" . }}
    </footer>
</body>
</html>
