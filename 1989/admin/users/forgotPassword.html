    <script type="text/javascript">
    //<![CDATA[
    
        function itemSwitchImage(whichImage) {
            if(!document.getElementById("item-image-gallery-fullsize")) return;
            
            var source = whichImage.getAttribute("href");
            var fullsize = document.getElementById("item-image-gallery-fullsize");
            
            if(fullsize.nodeName != "IMG") return true;
            
            fullsize.setAttribute("src",source);
            
            return false;
        }
        
        function prepItemImageGallery() {
            if(!document.getElementById) return;
            if(!document.getElementsByTagName) return;
            if(!document.getElementById("item-image-gallery")) return;
            
            var thumbnails = document.getElementById("item-image-gallery-thumbnails");
            var links = thumbnails.getElementsByTagName("a");
            for(var i=0; i<links.length; i++) {
                links[i].onclick = function() {
                    return itemSwitchImage(this);
                }
            }  
        }
        
        Event.observe(window,"load",prepItemImageGallery);
        //]]>
        
    </script>
